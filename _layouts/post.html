---
layout: default
---

<article class="post">

  <header class="post-header">
    <h1>{{ page.title }}</h1>

    <div class="post-meta">
      <span>
        <i class="far fa-calendar"></i>
        {{ page.date | date: "%d %B %Y" }}
      </span>

      {% if page.categories %}
      <span class="post-cat">
        {{ page.categories | join: ", " }}
      </span>
      {% endif %}
    </div>
  </header>

  {% if page.image %}
  <div class="post-hero">
    <img src="{{ page.image }}" alt="{{ page.title }}">
  </div>
  {% endif %}

  <div class="post-content">
    {{ content }}
  </div>

</article>
